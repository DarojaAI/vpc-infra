# Pre-commit hooks for gcp-postgres-terraform
# Install: pip install pre-commit && pre-commit install

repos:
  # Filesystem hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=5000']

  # Terraform formatting & validation
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.84.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_docs
        args: [--hook-config=--path-to-file=README.md]

  # Checkov - Security scanning
  - repo: https://github.com/bridgecrewio/checkov-pre-commit
    rev: 3.1.50
    hooks:
      - id: checkov
        args: [--directory, terraform/, --skip-path, terraform/.terraform]

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # YAML validation for workflows
  - repo: https://github.com/pre-commit/mirrors-yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [--strict]
        files: ^\.github/workflows/

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [-x, -s, bash]
